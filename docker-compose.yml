version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: negotiamind_backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - negotiamind_network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: negotiamind_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - negotiamind_network

  redis:
    image: redis:7-alpine
    container_name: negotiamind_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - negotiamind_network

volumes:
  redis_data:

networks:
  negotiamind_network:
    driver: bridge
